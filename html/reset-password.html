<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title localization-key="reset.meta.title">Reset Password - ReserveHub</title>
    <link rel="icon" type="image/x-icon" href="../pictures/reservehub-favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href='https://fonts.googleapis.com/css?family=Alexandria' rel='stylesheet'>
    <link rel="stylesheet" href="../css/auth-styles.css">
</head>

<body>
    <div class="bg-animations">
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
        <div class="blob"></div>
    </div>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
        <i class="fa-solid fa-moon"></i>
        <i class="fa-solid fa-sun"></i>
    </button>
    <div style="position: fixed; top: 18px; right: 72px; z-index: 20;">
        <select class="reset-language-localization" aria-label="Select language" style="padding: 8px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.25); background: rgba(0,0,0,0.25); color: #fff; font-size: 13px; font-weight: 600; backdrop-filter: blur(6px);">
            <option value="en">English</option>
            <option value="fr">Français</option>
        </select>
    </div>
    <div class="auth-container" style="max-width: 500px; grid-template-columns: 1fr;">
        <div class="auth-forms" style="width: 100%;">
            <div class="form-wrapper active" id="resetPasswordForm">
                <div class="form-content">
                    <div class="form-header">
                        <h2 localization-key="reset.header.title">Set New Password</h2>
                        <p localization-key="reset.header.subtitle">Please enter your new password below</p>
                    </div>

                    <form id="resetPasswordFormElement" class="auth-form">
                        <input type="hidden" id="resetToken" value="">
                        
                        <div class="form-group">
                            <label localization-key="reset.form.newPassword.label" for="newPassword">New Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="newPassword" localization-key="reset.form.newPassword.placeholder" localization-target="placeholder" placeholder="Create a strong password" required>
                                <button type="button" class="toggle-password" onclick="toggleResetPassword('newPassword', this)" aria-label="Toggle password visibility">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <span class="error-message" id="newPasswordError"></span>
                        </div>

                        <div class="form-group">
                            <label localization-key="reset.form.confirmPassword.label" for="confirmNewPassword">Confirm Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input type="password" id="confirmNewPassword" localization-key="reset.form.confirmPassword.placeholder" localization-target="placeholder" placeholder="Re-enter your password" required>
                                <button type="button" class="toggle-password" onclick="toggleResetPassword('confirmNewPassword', this)" aria-label="Toggle password visibility">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <span class="error-message" id="confirmNewPasswordError"></span>
                        </div>

                        <button type="submit" class="submit-btn">
                            <span localization-key="reset.form.submit">Update Password</span>
                            <i class="fas fa-check"></i>
                        </button>
                    </form>

                    <div class="form-footer" style="margin-top: 2rem;">
                        <p><span localization-key="reset.footer.back">Back to</span> <a href="login-signup.html" localization-key="reset.footer.signIn" style="color: var(--primary-color); font-weight: 600; text-decoration: none;">Sign in</a></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="success-modal" id="successModal">
            <div class="success-content">
                <i class="fas fa-check-circle"></i>
                <h3 id="successTitle"></h3>
                <p id="successText"></p>
            </div>
        </div>
    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/localization.js"></script>
    <script src="../js/reset-password-script.js"></script>
</body>

</html>
