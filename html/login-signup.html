<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup - ReserveHub</title>
    <link rel="icon" type="image/x-icon" href="../pictures/reservehub-favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href='https://fonts.googleapis.com/css?family=Alexandria' rel='stylesheet'>
    <link rel="stylesheet" href="../css/auth-styles.css">
</head>
<body>
    <div class="auth-container">
        <!-- Left Section - Branding -->
        <div class="auth-brand">
            <div class="brand-content">
                <img src="../pictures/reservehub-full-logo.png" alt="ReserveHub Logo" class="brand-logo">
                <h1>ReserveHub</h1>
                <p class="brand-tagline">All Restaurants, One Booking</p>
                <div class="brand-features">
                    <div class="feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Easy Reservations</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Best Restaurants</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-check-circle"></i>
                        <span>Instant Booking</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Section - Forms -->
        <div class="auth-forms">
            <!-- Login Form -->
            <div class="form-wrapper active" id="loginForm">
                <div class="form-content">
                    <div class="form-header">
                        <h2>Welcome Back</h2>
                        <p>Sign in to your ReserveHub account</p>
                    </div>

                    <form id="loginFormElement" class="auth-form">
                        <div class="form-group">
                            <label for="loginEmail">Email Address</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input 
                                    type="email" 
                                    id="loginEmail" 
                                    placeholder="you@example.com" 
                                    required
                                >
                            </div>
                            <span class="error-message" id="loginEmailError"></span>
                        </div>

                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input 
                                    type="password" 
                                    id="loginPassword" 
                                    placeholder="Enter your password" 
                                    required
                                >
                                <button 
                                    type="button" 
                                    class="toggle-password" 
                                    onclick="togglePassword('loginPassword')"
                                    aria-label="Toggle password visibility"
                                >
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <span class="error-message" id="loginPasswordError"></span>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-wrapper">
                                <input type="checkbox" id="rememberMe">
                                <span class="checkmark"></span>
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-password">Forgot password?</a>
                        </div>

                        <button type="submit" class="submit-btn">
                            <span>Sign In</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </form>

                    <div class="form-divider">
                        <span>or continue with</span>
                    </div>

                    <div class="social-login">
                        <button type="button" class="social-btn google" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i>
                        </button>
                        <button type="button" class="social-btn github" onclick="socialLogin('github')">
                            <i class="fab fa-github"></i>
                        </button>
                        <button type="button" class="social-btn facebook" onclick="socialLogin('facebook')">
                            <i class="fab fa-facebook-f"></i>
                        </button>
                    </div>

                    <div class="form-footer">
                        <p>Don't have an account? 
                            <button 
                                type="button" 
                                class="switch-form" 
                                onclick="switchForm('signup')"
                            >
                                Sign up
                            </button>
                        </p>
                    </div>
                </div>
            </div>

            <!-- Signup Form -->
            <div class="form-wrapper" id="signupForm">
                <div class="form-content">
                    <div class="form-header">
                        <h2>Create Account</h2>
                        <p>Join ReserveHub today</p>
                    </div>

                    <form id="signupFormElement" class="auth-form">
                        <div class="form-group">
                            <label for="signupName">Full Name</label>
                            <div class="input-wrapper">
                                <i class="fas fa-user"></i>
                                <input 
                                    type="text" 
                                    id="signupName" 
                                    placeholder="John Doe" 
                                    required
                                >
                            </div>
                            <span class="error-message" id="signupNameError"></span>
                        </div>

                        <div class="form-group">
                            <label for="signupEmail">Email Address</label>
                            <div class="input-wrapper">
                                <i class="fas fa-envelope"></i>
                                <input 
                                    type="email" 
                                    id="signupEmail" 
                                    placeholder="you@example.com" 
                                    required
                                >
                            </div>
                            <span class="error-message" id="signupEmailError"></span>
                        </div>

                        <div class="form-group">
                            <label for="signupPhone">Phone Number</label>
                            <div class="input-wrapper">
                                <i class="fas fa-phone"></i>
                                <input 
                                    type="tel" 
                                    id="signupPhone" 
                                    placeholder="+1 234 567 8900" 
                                    required
                                >
                            </div>
                            <span class="error-message" id="signupPhoneError"></span>
                        </div>

                        <div class="form-group">
                            <label for="signupPassword">Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input 
                                    type="password" 
                                    id="signupPassword" 
                                    placeholder="Create a strong password" 
                                    required
                                    oninput="checkPasswordStrength(this.value)"
                                >
                                <button 
                                    type="button" 
                                    class="toggle-password" 
                                    onclick="togglePassword('signupPassword')"
                                    aria-label="Toggle password visibility"
                                >
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <span class="error-message" id="signupPasswordError"></span>
                            <div class="password-strength" id="passwordStrength"></div>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <div class="input-wrapper">
                                <i class="fas fa-lock"></i>
                                <input 
                                    type="password" 
                                    id="confirmPassword" 
                                    placeholder="Re-enter your password" 
                                    required
                                >
                                <button 
                                    type="button" 
                                    class="toggle-password" 
                                    onclick="togglePassword('confirmPassword')"
                                    aria-label="Toggle password visibility"
                                >
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <span class="error-message" id="confirmPasswordError"></span>
                        </div>

                        <div class="form-options">
                            <label class="checkbox-wrapper">
                                <input type="checkbox" id="agreeTerms" required>
                                <span class="checkmark"></span>
                                <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
                            </label>
                            <span class="error-message" id="agreeTermsError"></span>
                        </div>

                        <button type="submit" class="submit-btn">
                            <span>Create Account</span>
                            <i class="fas fa-arrow-right"></i>
                        </button>
                    </form>

                    <div class="form-divider">
                        <span>or continue with</span>
                    </div>

                    <div class="social-login">
                        <button type="button" class="social-btn google" onclick="socialLogin('google')">
                            <i class="fab fa-google"></i>
                        </button>
                        <button type="button" class="social-btn github" onclick="socialLogin('github')">
                            <i class="fab fa-github"></i>
                        </button>
                        <button type="button" class="social-btn facebook" onclick="socialLogin('facebook')">
                            <i class="fab fa-facebook-f"></i>
                        </button>
                    </div>

                    <div class="form-footer">
                        <p>Already have an account? 
                            <button 
                                type="button" 
                                class="switch-form" 
                                onclick="switchForm('login')"
                            >
                                Sign in
                            </button>
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Success Message -->
        <div class="success-modal" id="successModal">
            <div class="success-content">
                <i class="fas fa-check-circle"></i>
                <h3 id="successTitle"></h3>
                <p id="successText"></p>
            </div>
        </div>
    </div>

    <script src="../js/auth-script.js?v=2"></script>
</body>
</html>
