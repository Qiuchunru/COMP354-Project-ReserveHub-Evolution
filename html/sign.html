<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Restaurant Reservation System</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4') no-repeat center center/cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: rgba(0, 0, 0, 0.75);
      padding: 30px;
      border-radius: 10px;
      width: 350px;
      color: #fff;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #f4c542;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 5px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #f4c542;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #e0b837;
    }

    .toggle {
      text-align: center;
      margin-top: 10px;
      cursor: pointer;
      color: #ccc;
    }

    .toggle:hover {
      color: #fff;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Login Form -->
  <div id="loginForm">
    <h2>Login</h2>
    <input type="text" placeholder="Username" id="loginUsername">
    <input type="password" placeholder="Password" id="loginPassword">
    <button onclick="login()">Login</button>
    <div class="toggle" onclick="toggleForms()">Don't have an account? Sign up</div>
  </div>

  <!-- Sign Up Form -->
  <div id="signupForm" class="hidden">
    <h2>Sign Up</h2>
    <input type="email" placeholder="Email" id="signupEmail">
    <input type="text" placeholder="Username" id="signupUsername">
    <input type="password" placeholder="Password" id="signupPassword">
    <button onclick="signup()">Create Account</button>
    <div class="toggle" onclick="toggleForms()">Already have an account? Login</div>
  </div>
</div>

<script>
  function toggleForms() {
    document.getElementById('loginForm').classList.toggle('hidden');
    document.getElementById('signupForm').classList.toggle('hidden');
  }

  function signup() {
    const email = document.getElementById('signupEmail').value;
    const username = document.getElementById('signupUsername').value;
    const password = document.getElementById('signupPassword').value;

    if (!email || !username || !password) {
      alert("Please fill all fields");
      return;
    }

    // Store in localStorage (demo only)
    localStorage.setItem('user', JSON.stringify({ email, username, password }));
    alert("Account created! Please login.");
    toggleForms();
  }

  function login() {
    const username = document.getElementById('loginUsername').value;
    const password = document.getElementById('loginPassword').value;

    const storedUser = JSON.parse(localStorage.getItem('user'));

    if (!storedUser) {
      alert("No account found. Please sign up.");
      return;
    }

    if (username === storedUser.username && password === storedUser.password) {
      alert("Login successful! Welcome to the reservation system.");
    } else {
      alert("Invalid credentials.");
    }
  }
</script>

</body>
</html>
