<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>My Profile | ReserveHub</title>
    <link rel="icon" type="image/x-icon" href="../pictures/reservehub-favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/profile.css">
    <style>
        .profile-avatar:hover .avatar-overlay {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar scrolled" id="navbar">
        <a href="index.html" aria-label="ReserveHub Homepage" class="nav-logo-link">
            <img src="../pictures/reservehub-full-logo-light-mode.png" alt="ReserveHub Logo" class="top-logo">
        </a>
        <div class="top-btn-container" id="auth-buttons">
            <!-- Will be populated by session.js -->
        </div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" style="margin-left: 10px;">
            <i class="fa-solid fa-moon"></i>
            <i class="fa-solid fa-sun"></i>
        </button>
        <button class="hamburger" id="hamburger" aria-label="Open menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <div class="mobile-nav" id="mobileNav">
        <a href="index.html" class="mob-link">Home</a>
        <!-- Will be populated by session.js -->
    </div>

    <!-- ===== PROFILE SECTION ===== -->
    <main class="profile-main">
        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-avatar" id="profileAvatar" onclick="document.getElementById('avatarInput').click()" style="position: relative; cursor: pointer; overflow: hidden;">
                    <i class="fa-solid fa-user"></i>
                    <div class="avatar-overlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;">
                        <i class="fa-solid fa-camera" style="font-size: 24px; color: white;"></i>
                    </div>
                </div>
                <input type="file" id="avatarInput" style="display: none;" accept="image/*" onchange="uploadAvatar(this)">
                <div class="profile-info">
                    <h1 id="profileName">Loading...</h1>
                    <p id="profileUsername" style="color: var(--orange); font-size: 1.1rem; margin-top: -5px; margin-bottom: 10px; font-weight: 600;"></p>
                    <p id="profileEmail">Fetching your details...</p>
                    <p id="profilePhone" style="color: var(--orange); font-weight: 600; margin-top: 5px;"></p>
                    <div style="display: flex; align-items: center; gap: 15px; margin-top: 10px;">
                        <span class="member-since" id="profileDate" style="display:block;"></span>
                        <button onclick="openEditModal()" class="edit-profile-btn" style="background: var(--glass); border: 1px solid var(--border); color: var(--text); padding: 5px 15px; border-radius: 50px; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; transition: var(--transition);">
                            <i class="fa-solid fa-pen-to-square"></i> Edit Profile
                        </button>
                    </div>
                </div>
            </div>

            <div class="profile-content">
                <div class="dashboard-card">
                    <div class="card-header">
                        <h2><i class="fa-regular fa-calendar-check"></i> My Reservations</h2>
                    </div>
                    <div class="card-body">
                        <div id="reservationsList">
                            <div class="empty-state">
                                <i class="fa-solid fa-utensils"></i>
                                <p>You don't have any upcoming reservations yet.</p>
                                <a href="search.html" class="reserve-btn">Find a Restaurant</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="dashboard-card">
                    <div class="card-header">
                        <h2><i class="fa-regular fa-heart"></i> Saved Restaurants</h2>
                    </div>
                    <div class="card-body">
                        <div id="savedRestaurantsList" class="restaurants-grid" style="display: grid; grid-template-columns: 1fr; gap: 15px;">
                            <div class="empty-state">
                                <i class="fa-regular fa-bookmark"></i>
                                <p>Restaurants you save will appear here.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="footer-bottom" style="border-top:none;">
            <p>© 2026 ReserveHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/theme.js"></script>
    <script src="../js/session.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userStr = localStorage.getItem('reservehub_user') || sessionStorage.getItem('reservehub_user');
            
            if (!userStr) {
                window.location.href = 'login-signup.html';
                return;
            }

            const sessionData = JSON.parse(userStr);

            // Fetch latest data from database
            fetch('../api/profile.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: sessionData.email })
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    const user = data.user;
                    document.getElementById('profileName').textContent = user.name;
                    document.getElementById('profileUsername').textContent = user.username ? '@' + user.username : '';
                    document.getElementById('profileEmail').textContent = user.email;
                    document.getElementById('profilePhone').textContent = user.phone ? `<i class="fa-solid fa-phone"></i> ${user.phone}` : '';
                    document.getElementById('profilePhone').innerHTML = user.phone ? `<i class="fa-solid fa-phone" style="font-size: 12px; margin-right: 5px;"></i> ${user.phone}` : 'No phone number provided';
                    
                    const date = new Date(user.created_at);
                    document.getElementById('profileDate').textContent = 'Member since ' + date.toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
                    
                    // Display Profile Picture or Initial
                    const avatarDiv = document.getElementById('profileAvatar');
                    if (user.profile_picture) {
                        avatarDiv.innerHTML = `<img src="../uploads/profile_pics/${user.profile_picture}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                                               <div class="avatar-overlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;"><i class="fa-solid fa-camera" style="font-size: 24px; color: white;"></i></div>`;
                    } else {
                        avatarDiv.innerHTML = `${user.name.charAt(0).toUpperCase()}
                                               <div class="avatar-overlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;"><i class="fa-solid fa-camera" style="font-size: 24px; color: white;"></i></div>`;
                    }

                    // Fetch Reservations
                    fetchReservations(user.id);
                    // Fetch Saved Restaurants
                    fetchSavedRestaurants(user.id);
                } else {
                    document.getElementById('profileName').textContent = 'Error loading profile';
                    document.getElementById('profileEmail').textContent = data.message;
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('profileName').textContent = sessionData.name; // Fallback to session
                document.getElementById('profileEmail').textContent = sessionData.email;
            });

            function fetchReservations(userId) {
                fetch('../api/profile_reservations.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId })
                })
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('reservationsList');
                    if(data.success && data.data.length > 0) {
                        list.innerHTML = '';
                        data.data.forEach(res => {
                            const resCard = document.createElement('div');
                            resCard.className = 'reservation-item';
                            resCard.style = 'display: flex; gap: 15px; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center;';
                            
                            const isPast = new Date(res.date + ' ' + res.time) < new Date();
                            
                            resCard.innerHTML = `
                                <img src="${res.image_url}" style="width: 80px; height: 60px; object-fit: cover; border-radius: 8px;">
                                <div style="flex: 1;">
                                    <h4 style="margin: 0; font-size: 1rem;">${res.restaurant_name}</h4>
                                    <p style="margin: 4px 0; font-size: 0.85rem; color: #888;">
                                        <i class="fa-regular fa-calendar"></i> ${res.date} | <i class="fa-regular fa-clock"></i> ${res.time.slice(0,5)}
                                    </p>
                                    <p style="margin: 0; font-size: 0.8rem; color: var(--orange);">Table ${res.table_number} | ${res.guests} Guests</p>
                                </div>
                                <div>
                                    ${isPast ? `<button class="review-btn" onclick="openReviewModal(${res.id}, ${res.restaurant_id})" style="background: transparent; border: 1px solid var(--orange); color: var(--orange); padding: 5px 12px; border-radius: 4px; font-size: 0.8rem; cursor: pointer;">Review</button>` : `<span style="color: #27ae60; font-size: 0.8rem;">Upcoming</span>`}
                                </div>
                            `;
                            list.appendChild(resCard);
                        });
                    }
                });
            }

            function fetchSavedRestaurants(userId) {
                fetch(`../api/get_saved.php?user_id=${userId}`)
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('savedRestaurantsList');
                    if(data.success && data.data.length > 0) {
                        list.innerHTML = '';
                        data.data.forEach(rest => {
                            const card = document.createElement('div');
                            card.className = 'saved-item';
                            card.style = 'display: flex; gap: 15px; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); align-items: center;';
                            card.innerHTML = `
                                <img src="${rest.image_url}" style="width: 70px; height: 50px; object-fit: cover; border-radius: 6px;">
                                <div style="flex: 1;">
                                    <h4 style="margin: 0; font-size: 0.95rem;">${rest.name}</h4>
                                    <p style="margin: 4px 0; font-size: 0.8rem; color: #888;">${rest.cuisine} · ${rest.location}</p>
                                </div>
                                <button onclick="window.location.href='restaurant.html?id=${rest.id}'" style="background: var(--orange); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; cursor: pointer;">Book</button>
                            `;
                            list.appendChild(card);
                        });
                    }
                });
            }
        });

        function openEditModal() {
            const userStr = localStorage.getItem('reservehub_user') || sessionStorage.getItem('reservehub_user');
            const user = JSON.parse(userStr);
            
            document.getElementById('editName').value = user.name || '';
            document.getElementById('editUsername').value = user.username || '';
            document.getElementById('editPhone').value = user.phone || '';
            document.getElementById('editProfileModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editProfileModal').style.display = 'none';
        }

        function submitProfileUpdate(e) {
            e.preventDefault();
            const userStr = localStorage.getItem('reservehub_user') || sessionStorage.getItem('reservehub_user');
            const user = JSON.parse(userStr);
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerHTML;

            submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
            submitBtn.disabled = true;

            const payload = {
                user_id: user.id,
                name: document.getElementById('editName').value,
                username: document.getElementById('editUsername').value,
                phone: document.getElementById('editPhone').value
            };

            fetch('../api/update_profile.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    // Update Local Storage
                    const updatedUser = { ...user, name: data.user.name, username: data.user.username, phone: data.user.phone };
                    if(localStorage.getItem('reservehub_user')) {
                        localStorage.setItem('reservehub_user', JSON.stringify(updatedUser));
                    } else {
                        sessionStorage.setItem('reservehub_user', JSON.stringify(updatedUser));
                    }

                    // Update UI
                    document.getElementById('profileName').textContent = data.user.name;
                    document.getElementById('profileUsername').textContent = data.user.username ? '@' + data.user.username : '';
                    document.getElementById('profilePhone').innerHTML = data.user.phone ? `<i class="fa-solid fa-phone" style="font-size: 12px; margin-right: 5px;"></i> ${data.user.phone}` : 'No phone number provided';
                    document.getElementById('profileAvatar').innerHTML = data.user.name.charAt(0).toUpperCase();
                    
                    alert('Profile updated successfully!');
                    closeEditModal();
                } else {
                    alert(data.message);
                }
            })
            .catch(err => {
                console.error(err);
                alert('An error occurred. Please try again.');
            })
            .finally(() => {
                submitBtn.innerHTML = originalBtnText;
                submitBtn.disabled = false;
            });
        }

        function uploadAvatar(input) {
            if (!input.files || !input.files[0]) return;

            const userStr = localStorage.getItem('reservehub_user') || sessionStorage.getItem('reservehub_user');
            const user = JSON.parse(userStr);
            const formData = new FormData();
            formData.append('avatar', input.files[0]);
            formData.append('user_id', user.id);

            const avatarDiv = document.getElementById('profileAvatar');
            const originalContent = avatarDiv.innerHTML;
            avatarDiv.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="font-size: 30px;"></i>';

            fetch('../api/upload_avatar.php', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Update UI
                    avatarDiv.innerHTML = `<img src="../uploads/profile_pics/${data.profile_picture}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
                                           <div class="avatar-overlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s;"><i class="fa-solid fa-camera" style="font-size: 24px; color: white;"></i></div>`;
                    
                    // Update Local Storage
                    const updatedUser = { ...user, profile_picture: data.profile_picture };
                    if(localStorage.getItem('reservehub_user')) {
                        localStorage.setItem('reservehub_user', JSON.stringify(updatedUser));
                    } else {
                        sessionStorage.setItem('reservehub_user', JSON.stringify(updatedUser));
                    }
                    
                    alert('Profile picture updated!');
                } else {
                    avatarDiv.innerHTML = originalContent;
                    alert(data.message);
                }
            })
            .catch(err => {
                console.error(err);
                avatarDiv.innerHTML = originalContent;
                alert('Upload failed. Please try again.');
            });
        }

        function openReviewModal(resId, restId) {
            const modal = document.getElementById('reviewModal');
            document.getElementById('reviewResId').value = resId;
            document.getElementById('reviewRestId').value = restId;
            modal.style.display = 'flex';
        }

        function closeReviewModal() {
            document.getElementById('reviewModal').style.display = 'none';
        }

        function submitReview(e) {
            e.preventDefault();
            const userStr = localStorage.getItem('reservehub_user') || sessionStorage.getItem('reservehub_user');
            const user = JSON.parse(userStr);

            const payload = {
                user_id: user.id,
                restaurant_id: document.getElementById('reviewRestId').value,
                reservation_id: document.getElementById('reviewResId').value,
                rating: document.getElementById('reviewRating').value,
                comment: document.getElementById('reviewComment').value
            };

            fetch('../api/add_review.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    alert('Review submitted successfully!');
                    closeReviewModal();
                } else {
                    alert(data.message);
                }
            });
        }
    </script>

    <!-- Review Modal -->
    <div id="reviewModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
        <div style="background: #1a1a1a; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1);">
            <h3 style="margin-top: 0;">Rate your experience</h3>
            <form onsubmit="submitReview(event)">
                <input type="hidden" id="reviewResId">
                <input type="hidden" id="reviewRestId">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Rating</label>
                    <select id="reviewRating" style="width: 100%; background: #2a2a2a; color: white; border: 1px solid #333; padding: 8px; border-radius: 8px;" required>
                        <option value="5">5 - Excellent</option>
                        <option value="4">4 - Very Good</option>
                        <option value="3">3 - Good</option>
                        <option value="2">2 - Fair</option>
                        <option value="1">1 - Poor</option>
                    </select>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Comment</label>
                    <textarea id="reviewComment" style="width: 100%; background: #2a2a2a; color: white; border: 1px solid #333; padding: 8px; border-radius: 8px; min-height: 80px;" placeholder="What did you think of the food and service?"></textarea>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="button" onclick="closeReviewModal()" style="flex: 1; background: #333; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">Cancel</button>
                    <button type="submit" style="flex: 1; background: var(--orange); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px);">
        <div style="background: #1a1a1a; padding: 35px; border-radius: 20px; width: 90%; max-width: 450px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h3 style="margin: 0; font-size: 1.5rem; color: var(--text);">Edit Profile</h3>
                <button onclick="closeEditModal()" style="background: transparent; border: none; color: #888; font-size: 1.2rem; cursor: pointer;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form onsubmit="submitProfileUpdate(event)">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Full Name</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-user" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--orange); font-size: 0.9rem;"></i>
                        <input type="text" id="editName" style="width: 100%; background: #2a2a2a; color: white; border: 1px solid #333; padding: 12px 12px 12px 38px; border-radius: 10px; font-family: 'Alexandria', sans-serif;" required>
                    </div>
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Username</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--orange); font-weight: 700;">@</span>
                        <input type="text" id="editUsername" style="width: 100%; background: #2a2a2a; color: white; border: 1px solid #333; padding: 12px 12px 12px 30px; border-radius: 10px; font-family: 'Alexandria', sans-serif;" required>
                    </div>
                </div>
                <div style="margin-bottom: 25px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted);">Phone Number</label>
                    <div style="position: relative;">
                        <i class="fa-solid fa-phone" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--orange); font-size: 0.9rem;"></i>
                        <input type="tel" id="editPhone" style="width: 100%; background: #2a2a2a; color: white; border: 1px solid #333; padding: 12px 12px 12px 38px; border-radius: 10px; font-family: 'Alexandria', sans-serif;" placeholder="e.g. +1 234 567 890">
                    </div>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button type="button" onclick="closeEditModal()" style="flex: 1; background: #333; color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 600; font-family: 'Alexandria', sans-serif;">Cancel</button>
                    <button type="submit" style="flex: 1; background: var(--orange); color: white; border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 600; font-family: 'Alexandria', sans-serif;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
